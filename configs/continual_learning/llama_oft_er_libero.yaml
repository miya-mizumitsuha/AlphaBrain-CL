run_id: llama_oft_er_libero_goal_v1
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl]
wandb_entity: ""
wandb_project: llavavla
is_debug: false


framework:
  name: LlamaOFT
  llamavl:
    base_vlm: ${oc.env:PRETRAINED_MODELS_DIR}/Llama-3.2-11B-Vision-Instruct
    attn_implementation: sdpa
    vl_hidden_dim: 4096
  qwenvl:
    base_vlm: "Llama-3.2-11B-Vision-Instruct"  # routing hint only
  dino:
    dino_backbone: dinov2_vits14
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 4096
    hidden_size: 4096
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 7
    state_dim: 7
    future_action_window_size: 7
    action_horizon: 8
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: 4096
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 2560
      positional_embeddings: null
  reduce_in_full_precision: true


datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: ${oc.env:LEROBOT_LIBERO_DATA_DIR}
    dataset_mix: libero_goal
    action_type: delta_qpos
    sequential_step_sampling: false
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 1
    load_all_data_for_training: true
    obs: ["image_0"]
    video_backend: torchvision_av


# ============================================================================
# Continual Learning Configuration
# ============================================================================
continual_learning:
  task_sequence: libero_goal
  steps_per_task: 10000
  save_checkpoint_per_task: true

  replay:
    enabled: true
    method: experience_replay
    buffer_size_per_task: 1000
    replay_batch_ratio: 0.5
    balanced_sampling: true


# ============================================================================
# LoRA disabled: CL trainer hardcodes qwen_vl_interface path,
# LlamaOFT uses llama_vl_interface. Freeze LLM instead.
# ============================================================================
lora:
  enabled: false


trainer:
  max_train_steps: 100000
  num_warmup_steps: 500
  save_interval: 5000
  eval_interval: 5000
  learning_rate:
    base: 2.5e-05
    llama_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: "llama_vl_interface.model.language_model"
  loss_scale:
    vla: 1.0
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 8

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  save_format: pt
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
