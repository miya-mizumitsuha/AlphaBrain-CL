run_id: alphabrain_ewc_lora_libero_goal
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl]
wandb_entity: ""
wandb_project: llavavla
is_debug: false


framework:
  name: QwenGR00T
  qwenvl:
    base_vlm: ${oc.env:PRETRAINED_MODELS_DIR}/Qwen2.5-VL-3B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  dino:
    dino_backbone: dinov2_vits14
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 1024
    hidden_size: 1024
    add_pos_embed: True
    max_seq_len: 1024
    action_dim: 7
    state_dim: 7
    future_action_window_size: 7
    action_horizon: 8
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: 2048
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null

  reduce_in_full_precision: true


datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: ${oc.env:LEROBOT_LIBERO_DATA_DIR}
    dataset_mix: libero_goal
    action_type: delta_qpos
    sequential_step_sampling: False
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 4
    load_all_data_for_training: true
    obs: ["image_0"]
    video_backend: torchvision_av


# ============================================================================
# Continual Learning — EWC (Elastic Weight Consolidation) on LIBERO-Goal
# ============================================================================
# Production config (matches ER's qwengr00t_cl_lora_libero.yaml step budget).
# Default λ=1e4 is the starting point of our hyperparameter sweep.
# Override at launch via `--continual_learning.algorithm.lambda=<val>`.
# ============================================================================
continual_learning:
  task_sequence: libero_goal
  steps_per_task: 10000
  save_checkpoint_per_task: true

  algorithm:
    name: ewc
    lambda: 1.0e4                 # SWEEP dimension — override per run
    gamma: 1.0                    # 1.0 = pure additive EWC; <1.0 = online EWC
    lora_only: true               # Fisher only on LoRA params (~300 MB vs ~15 GB)
    fisher_num_batches: 100       # minibatches used to estimate Fisher at task end
    fisher_clip: 1.0e4            # clamp Fisher entries for numerical stability
    grad_clip_per_sample: 100.0   # per-batch grad clip before squaring
    # Dump accumulated Fisher + θ* after every task for offline analysis.
    # Only rank 0 writes; one file per task (~640 MB for 3B VLA + r=32 LoRA).
    fisher_save_dir: ${run_root_dir}/${run_id}/fisher_snapshots


# ============================================================================
# LoRA Configuration
# ============================================================================
lora:
  enabled: true
  rank: 32
  alpha: 16
  dropout: 0.05
  target_modules: "all-linear"


trainer:
  max_train_steps: 100000
  num_warmup_steps: 500
  save_interval: 5000
  eval_interval: 5000
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  save_format: pt
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
