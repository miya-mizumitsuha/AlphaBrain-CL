run_id: alphabrain_mir_lora_smoke_test
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl]
wandb_entity: ""
wandb_project: llavavla
is_debug: false


framework:
  name: QwenGR00T
  qwenvl:
    base_vlm: ${oc.env:PRETRAINED_MODELS_DIR}/Qwen2.5-VL-3B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  dino:
    dino_backbone: dinov2_vits14
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 1024
    hidden_size: 1024
    add_pos_embed: True
    max_seq_len: 1024
    action_dim: 7
    state_dim: 7
    future_action_window_size: 7
    action_horizon: 8
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: 2048
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null

  reduce_in_full_precision: true


datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: ${oc.env:LEROBOT_LIBERO_DATA_DIR}
    dataset_mix: libero_goal
    action_type: delta_qpos
    sequential_step_sampling: False
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 4
    load_all_data_for_training: true
    obs: ["image_0"]
    video_backend: torchvision_av


# ============================================================================
# Continual Learning — MIR (Maximally Interfered Retrieval)
# ============================================================================
# MIR scores replay candidates under a virtual SGD step and keeps the top-k
# samples whose loss would increase the most.  This version amortizes the
# scoring cost via periodic refresh (every `mir_refresh_interval` steps) —
# at defaults, overhead is ~10% over vanilla ER.
# Smoke-sized: refresh every 20 steps with a tiny candidate set so a
# 5-step×10-task smoke still exercises the full refresh path at least once
# after task 0 (if STEPS_PER_TASK gets overridden ≥ 20).
# ============================================================================
continual_learning:
  task_sequence: libero_goal
  steps_per_task: 100
  save_checkpoint_per_task: true

  algorithm:
    name: mir
    # --- Inherited from ER ---
    buffer_size_per_task: 50
    replay_batch_ratio: 0.5
    balanced_sampling: true
    # --- MIR-specific ---
    # Smoke-sized: refresh_interval=3 lets a 5-step-per-task smoke hit the
    # virtual-step path on task 1+ (step_count resets each task via
    # on_task_start, so e.g. production 200 would never fire in smoke).
    mir_refresh_interval: 3       # smoke-sized; production: 200
    mir_candidate_size: 8         # smoke-sized; production: 16
    mir_top_k: 4                  # smoke-sized; production: 8
    mir_virtual_lr: null          # null → MIR.DEFAULT_VIRTUAL_LR (1e-4)
    mir_lora_only: true


# ============================================================================
# LoRA Configuration
# ============================================================================
lora:
  enabled: true
  rank: 32
  alpha: 16
  dropout: 0.05
  target_modules: "all-linear"


trainer:
  max_train_steps: 1000
  num_warmup_steps: 20
  save_interval: 100
  eval_interval: 100
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  save_format: pt
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
