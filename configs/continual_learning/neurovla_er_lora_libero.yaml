run_id: neurovla_er_lora_libero_goal_v1
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl]
wandb_entity: ""
wandb_project: llavavla
is_debug: false


framework:
  name: NeuroVLA
  qwenvl:
    base_vlm: ${oc.env:PRETRAINED_MODELS_DIR}/Qwen2.5-VL-3B-Instruct
    attn_implementation: sdpa
    vl_hidden_dim: 2048
  layer_qformer:
    qformer_end_layer: 37
    qformer_start_layer: 36
    num_query_tokens: 8
    input_dim: 2048
    ouptput_dim: 768
    grad_scale: 0.5
  action_model:
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 7
    state_dim: 7
    future_action_window_size: 15
    action_horizon: 16
    past_action_window_size: 0
    repeated_diffusion_steps: 8

  reduce_in_full_precision: true


datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: ${oc.env:LEROBOT_LIBERO_DATA_DIR}
    dataset_mix: libero_goal
    action_type: delta_ee
    sequential_step_sampling: false
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 8
    load_all_data_for_training: true
    obs: ["image_0"]
    video_backend: torchvision_av
    include_state: true


# ============================================================================
# Continual Learning Configuration
# ============================================================================
continual_learning:
  task_sequence: libero_goal
  steps_per_task: 5000
  save_checkpoint_per_task: true

  replay:
    enabled: true
    method: experience_replay
    buffer_size_per_task: 1000
    replay_batch_ratio: 0.5
    balanced_sampling: true


# ============================================================================
# LoRA Configuration
# ============================================================================
# NeuroVLA 架构: qwen_vl_interface (3754M) → layer_qformer (8.7M) → edit_model (1M) → action_model (8.3M)
# 策略: LoRA VLM + 冻结 qformer/edit_model + 全参数 action_model
# 这与 QwenGR00T 的 "LoRA backbone + full-param action head" 范式对齐
lora:
  enabled: true
  rank: 32
  alpha: 16
  dropout: 0.05
  target_modules: "all-linear"
  freeze_extra_modules: "layer_qformer,edit_model"


trainer:
  max_train_steps: 50000
  num_warmup_steps: 500
  save_interval: 5000
  eval_interval: 5000
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    layer_qformer: 5.0e-05
    action_model: 1.0e-04
    edit_model: 5.0e-05
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  save_format: pt
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
