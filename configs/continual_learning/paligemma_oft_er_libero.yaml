run_id: paligemma_oft_er_libero_goal_v1
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl]
wandb_entity: "1271925333-nanjing-university"
wandb_project: llavavla
is_debug: false


framework:
  name: PaliGemmaOFT
  pi05: true
  paligemma:
    base_vlm: ${oc.env:PRETRAINED_MODELS_DIR}/paligemma-3b-pt-224
    from_openpi_config: false

  action_expert:
    width: 1024
    depth: 18
    mlp_dim: 4096
    num_heads: 8
    num_kv_heads: 1
    head_dim: 256
    precision: bfloat16

  action_model:
    action_dim: 7
    action_horizon: 10
    future_action_window_size: 9
    past_action_window_size: 0
    num_inference_steps: 10
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0

  reduce_in_full_precision: true


datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: ${oc.env:LIBERO_DATA_ROOT}
    dataset_mix: libero_goal
    action_type: delta_qpos
    sequential_step_sampling: false
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 2
    load_all_data_for_training: true
    obs: ["image_0", "wrist_image"]
    video_backend: torchvision_av
    include_state: true


# ============================================================================
# Continual Learning Configuration
# ============================================================================
continual_learning:
  task_sequence: libero_goal
  steps_per_task: 10000
  save_checkpoint_per_task: true

  replay:
    enabled: true
    method: experience_replay
    buffer_size_per_task: 1000
    replay_batch_ratio: 0.5
    balanced_sampling: true


# ============================================================================
# LoRA Configuration (disabled: CL trainer hardcodes qwen_vl_interface,
# PaliGemmaOFT uses vlm_interface; full-param for now)
# ============================================================================
lora:
  enabled: false
  rank: 32
  alpha: 16
  dropout: 0.05
  target_modules: "all-linear"


trainer:
  max_train_steps: 100000
  num_warmup_steps: 500
  save_interval: 5000
  eval_interval: 5000
  learning_rate:
    base: 2.5e-05
    vlm_interface: 1.0e-05
    flow_matching_head: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
