run_id: alphabrain_mir_lora_robocasa_atomic10
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl]
wandb_entity: ""
wandb_project: llavavla
is_debug: false


framework:
  name: QwenGR00T
  qwenvl:
    base_vlm: ${oc.env:PRETRAINED_MODELS_DIR}/Qwen2.5-VL-3B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  dino:
    dino_backbone: dinov2_vits14
  action_model:
    # Robocasa PandaOmron embodiment: action/state dims and DiT hidden widened
    # per `configs/datasets/robocasa365.yaml` reference (same as ER variant).
    action_model_type: DiT-B
    action_hidden_dim: 2560
    hidden_size: 2560
    add_pos_embed: True
    max_seq_len: 1024
    action_dim: 12                # concatenated action vector (EE pos+rot + gripper + base motion + ctrl mode)
    state_dim: 16                 # concatenated state vector (EE + gripper + base)
    future_action_window_size: 15
    action_horizon: 16
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: 2048
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 2560
      positional_embeddings: null

  reduce_in_full_precision: true


datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: ${oc.env:ROBOCASA365_DATA_DIR}
    dataset_mix: robocasa365_cl_atomic10
    action_mode: abs              # Robocasa convention (LIBERO uses delta_qpos)
    sequential_step_sampling: False
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 4
    load_all_data_for_training: true
    obs: ["robot0_agentview_left", "robot0_agentview_right", "robot0_eye_in_hand"]
    image_size: [224, 224]
    delete_pause_frame: false
    video_backend: pyav


# ============================================================================
# Continual Learning — MIR (Maximally Interfered Retrieval) on Robocasa-atomic10
# ============================================================================
# Task order matches the ER variant (qwengr00t_er_lora_robocasa_atomic10.yaml):
#   0: NavigateKitchen          (navigate)
#   1: OpenDrawer               (open storage)
#   2: OpenCabinet              (open storage)
#   3: CloseFridge              (close storage)
#   4: CloseBlenderLid          (close manipulable)
#   5: CoffeeSetupMug           (tool manipulation)
#   6: PickPlaceCounterToCabinet (pick-place, put in)
#   7: PickPlaceSinkToCounter    (pick-place, take out)
#   8: TurnOnMicrowave          (appliance on)
#   9: TurnOffStove             (appliance off)
#
# Defaults seeded from the LIBERO-Goal "widepool" sweep winner — the
# `mir_candidate_size=32, mir_top_k=16` configuration that beat default MIR by
# +8.8 pp on LIBERO-Goal.  Override at launch via
# `--continual_learning.algorithm.<knob>=<value>` for further sweeps.
#
# Budget: 10 × 10_000 = 100_000 total steps; ~15 h on 4× A800 bs=4 effective BS=16.
# ============================================================================
continual_learning:
  task_sequence: robocasa365_cl_atomic10
  steps_per_task: 10000
  save_checkpoint_per_task: true

  algorithm:
    name: mir
    # Replay policy — aligned with the LIBERO ER baseline (and our MIR widepool
    # winner on LIBERO).  Same as the ER variant of this Robocasa yaml.
    buffer_size_per_task: 1000
    replay_batch_ratio: 0.5
    balanced_sampling: true
    # MIR-specific — defaults baked to the LIBERO sweep winner ("widepool").
    mir_refresh_interval: 200     # baseline interval (LIBERO sweep showed 50/500 both worse)
    mir_candidate_size: 32        # |C|: candidates scored per refresh — widepool (×2 vs default 16)
    mir_top_k: 16                 # top-k interfered samples cached — widepool (×2 vs default 8)
    mir_virtual_lr: null          # null → MIR.DEFAULT_VIRTUAL_LR (1e-4)
    mir_lora_only: true


# ============================================================================
# LoRA Configuration
# ============================================================================
lora:
  enabled: true
  rank: 32
  alpha: 16
  dropout: 0.05
  target_modules: "all-linear"


trainer:
  max_train_steps: 100000
  num_warmup_steps: 500
  save_interval: 5000
  eval_interval: 5000
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  save_format: pt
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
