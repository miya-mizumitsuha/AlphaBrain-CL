run_id: paligemma_pi0_er_libero_goal_v1
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl]
wandb_entity: ""
wandb_project: llavavla
is_debug: false


# ============================================================================
# Framework: PaliGemmaPi0 (Pi0.5 flow-matching), openpi-aligned architecture.
# Matches VLA-Engine-Developer's `paligemma_pi0_openpi_aligned_v3` mode so the
# pretrained openpi checkpoint at /datasets/pi05 loads cleanly.
# ============================================================================
framework:
  name: PaliGemmaPi0
  pi05: true

  paligemma:
    base_vlm: ${oc.env:PALIGEMMA_VLM_PATH,/datasets/peligemma}
    attn_implementation: flash_attention_2
    depth: 18
    head_dim: 256
    mlp_dim: 16384
    num_heads: 8
    num_kv_heads: 1
    width: 2048
    num_images: 3
    image_mask: [true, true, false]
    tokenize_format: openpi
    max_token_len: 200
    discrete_state_input: false

  action_expert:
    width: 1024
    depth: 18
    mlp_dim: 4096
    num_heads: 8
    num_kv_heads: 1
    head_dim: 256
    precision: bfloat16

  # Action head matches openpi exactly: action_dim=32 + mask first 7 dims.
  action_model:
    action_dim: 32
    action_horizon: 10
    future_action_window_size: 9
    past_action_window_size: 0
    num_inference_steps: 10
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    action_mask: [true, true, true, true, true, true, true,
                  false, false, false, false, false, false, false, false,
                  false, false, false, false, false, false, false, false,
                  false, false, false, false, false, false, false, false]

  normalization:
    enabled: true
    action_mean: [0.06278156, 0.08684081, -0.09037306, 0.00054074, 0.00564338, -0.00522910, -0.04964072]
    action_std:  [0.33552372, 0.37844700, 0.44472861, 0.03924354, 0.06339297, 0.07797027, 0.99876714]
    state_mean:  [-0.04651878, 0.03440907, 0.76455247, 2.97220945, -0.22046979, -0.12557940, 0.02691425, -0.02719078]
    state_std:   [0.10494395, 0.15176620, 0.37851673, 0.34427372, 0.90694684, 0.32539192, 0.01417590, 0.01405889]

  reduce_in_full_precision: true


# ============================================================================
# Dataset — libero_goal only, PaliGemma-style dataloader (multi-view + state).
# ============================================================================
datasets:
  vla_data:
    dataset_py: lerobot_datasets
    dataloader_module: paligemma_datasets
    data_root_dir: ${oc.env:LEROBOT_LIBERO_DATA_DIR}
    dataset_mix: libero_goal
    action_type: delta_qpos
    sequential_step_sampling: false
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 8
    load_all_data_for_training: true
    obs: ["image_0", "wrist_image"]
    video_backend: torchvision_av
    include_state: true
    action_horizon: 10
    state_dim: 8


# ============================================================================
# Continual Learning — ER baseline first (swap for EWC/MIR via algorithm block).
# ============================================================================
continual_learning:
  task_sequence: libero_goal
  steps_per_task: 10000
  save_checkpoint_per_task: true

  replay:
    enabled: true
    method: experience_replay
    buffer_size_per_task: 1000
    replay_batch_ratio: 0.5
    balanced_sampling: true


# LoRA disabled by default — Pi0 uses full-param following openpi.
lora:
  enabled: false
  rank: 32
  alpha: 16
  dropout: 0.05
  target_modules: "all-linear"


trainer:
  # Openpi Pi0.5 initial weights (self-contained safetensors dir).
  # Override with env var PI05_PRETRAINED_PATH if moved.
  pretrained_checkpoint: ${oc.env:PI05_PRETRAINED_PATH,/datasets/pi05}

  max_train_steps: 100000
  num_warmup_steps: 500
  save_interval: 5000
  eval_interval: 5000

  learning_rate:
    base: 5.0e-05
    paligemma_vl_interface: 5.0e-05
    action_model: 5.0e-05
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-05

  freeze_modules: ''
  loss_scale:
    vla: 1.0
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-10

  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
