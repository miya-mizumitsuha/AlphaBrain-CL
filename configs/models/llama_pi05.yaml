# LlamaPi05 框架配置 (Llama 3.2 Vision + π₀.₅ architecture with prefix-cache mode)
# Llama 3.2 Vision VLM + Gemma action expert + flow matching denoising

framework:
  name: LlamaPi05
  pi05: true  # π₀.₅ mode: adaRMS timestep conditioning

  # ── VLM Backbone (Llama 3.2 Vision) ──
  llamavl:
    attn_implementation: sdpa
    base_vlm: ${PRETRAINED_MODELS_DIR}/Llama-3.2-11B-Vision-Instruct

  # ── Action Expert (独立 Gemma 300M) ──
  action_expert:
    width: 1024
    depth: 18
    mlp_dim: 4096
    num_heads: 8
    num_kv_heads: 1
    head_dim: 256
    precision: bfloat16

  # ── Action Head (Flow Matching) ──
  action_model:
    action_dim: 7
    action_horizon: 10               # LIBERO 用 10
    future_action_window_size: 9
    past_action_window_size: 0
    num_inference_steps: 10
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0

  # ── Precision Settings ──
  reduce_in_full_precision: true