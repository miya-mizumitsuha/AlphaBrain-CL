# LlamaPi0: Llama 3.2 11B Vision + Llama Action Expert + Joint Attention + Flow Matching
# True π₀ architecture with Llama backbone
# Key innovation: VLM and Action Expert use same attention format → true joint attention

framework:
  name: LlamaPi0
  pi05: false  # π₀ mode, no adaRMS timestep conditioning

  # ── VLM Backbone (Llama 3.2 11B Vision) ──
  llamavl:
    attn_implementation: sdpa
    base_vlm: ${PRETRAINED_MODELS_DIR}/Llama-3.2-11B-Vision-Instruct

  # ── Action Expert (Llama Architecture, 400M params) ──
  action_expert:
    type: llama  # Use LlamaActionExpert instead of GemmaActionExpert
    width: 1024
    depth: 18
    mlp_dim: 4096
    num_heads: 32         # Match Llama VLM: 32 attention heads
    num_kv_heads: 8       # Match Llama VLM: 8 key-value heads  
    head_dim: 128         # Match Llama VLM: 128 head dimension
    precision: bfloat16

  # ── Action Head (Flow Matching, π₀ mode) ──
  action_model:
    action_dim: 7
    action_horizon: 10               # LIBERO uses 10
    future_action_window_size: 9
    past_action_window_size: 0
    num_inference_steps: 10
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0

  # ── Training Settings ──
  reduce_in_full_precision: true

# Notes:
# 1. π₀ architecture: timestep via suffix embedding, NOT adaRMS conditioning
# 2. Joint attention: VLM前22层独立，后18层与expert做逐层joint attention  
# 3. Attention compatibility: 32 heads, 8 kv_heads, 128 head_dim matches exactly
# 4. ~400M expert vs ~300M Gemma expert, similar parameter count