        future_action_window_size: 7
    datasets:
      vla_data:
        dataloader_module: lerobot_datasets
    trainer:
      learning_rate:
        base: 3.0e-05
        action_model: 1.0e-04
        llama_vl_interface: 1.0e-05
    extra_args: []

  llama_oft_long:
    model: llama_oft
    num_gpus: 4
    run_id: "llama_oft_long"
    framework_name: "LlamaOFT"
    data_root: "${LIBERO_DATA_ROOT}"
    dataset: libero
    dataset_mix: "libero_long"
    deepspeed_config: "configs/deepspeed/accelerate_zero2_4gpu_nooffload.yaml"
    training:
      per_device_batch_size: 2
      gradient_accumulation_steps: 4
      max_train_steps: 120000
      save_interval: 20000
      eval_interval: 120001
      freeze_modules: "llama_vl_interface.model.language_model"
    framework:
      llamavl:
        base_vlm: ${PRETRAINED_MODELS_DIR}/Llama-3.2-11B-Vision-Instruct
      action_model:
        action_dim: 7
        future_action_window_size: 7
    datasets:
      vla_data:
        dataloader_module: lerobot_datasets
    trainer:
      learning_rate:
        base: 3.0e-05
        action_model: 1.0e-04
        llama_vl_interface: 1.0e-05
    extra_args: []

  # --------------------------------------------------------------------------
  # PaliGemmaPi05 (π₀.₅ Flow Matching) — multi-task LIBERO, openpi-aligned
  # openpi official: BS=256, 30k steps → 7.68M samples
  # Ours: per_device=64, 4 GPU, acc=1 → effective BS=256, 60k steps → 15.36M
  # --------------------------------------------------------------------------
  paligemma_pi05_openpi_aligned_v3:
    model: paligemma_pi05
    num_gpus: 4
    main_process_port: 29510
    run_id: "paligemma_pi05"
    wandb_project: "vla-engine-benchmark"
    wandb_base_url: "https://api.bandw.top"
    framework_name: "PaliGemmaPi05"
    data_root: "${LIBERO_DATA_ROOT}"
    dataset: libero
    dataset_mix: "libero_all"
    deepspeed_config: "configs/deepspeed/accelerate_zero2_4gpu_nooffload.yaml"
    use_ddp: false
    wandb_mode: "online"
    training:
      per_device_batch_size: 64
      gradient_accumulation_steps: 1
      max_train_steps: 30000
      save_interval: 10000
      eval_interval: 120001
      freeze_modules: ""
    trainer:
      pretrained_checkpoint: ${PRETRAINED_MODELS_DIR}/pi05_base
      learning_rate:
        base: 5.0e-05
        action_model: 5.0e-05
        paligemma_vl_interface: 5.0e-05
      num_warmup_steps: 10000
      lr_scheduler_type: "cosine_with_min_lr"
      scheduler_specific_kwargs:
        min_lr: 5.0e-05
      optimizer:
        name: AdamW
        betas: [0.9, 0.95]
        eps: 1.0e-08
        weight_decay: 1.0e-10
      gradient_clipping: 1.0
      ema:
        enabled: false
    framework:
      paligemma:
        base_vlm: ${PRETRAINED_MODELS_DIR}/paligemma-3b-pt-224
        # Only consumed by paths that call vlm_interface.model.forward (e.g. paligemma_oft).
        # v3 trains via _shared_forward (manual joint Q/K/V) and infers via eager attention,
        # so this flag is effectively dead — kept to mirror upstream yaml.
        attn_implementation: "flash_attention_2"
        discrete_state_input: false
      action_model:
        action_dim: 7
        action_horizon: 10
        future_action_window_size: 9
        num_inference_steps: 10
        noise_beta_alpha: 1.5
        noise_beta_beta: 1.0
      normalization:
        enabled: true
        action_mean: [0.06278156, 0.08684081, -0.09037306, 0.00054074, 0.00564338, -0.00522910, -0.04964072]
        action_std: [0.33552372, 0.37844700, 0.44472861, 0.03924354, 0.06339297, 0.07797027, 0.99876714]
        state_mean: [-0.04651878, 0.03440907, 0.76455247, 2.97220945, -0.22046979, -0.12557940, 0.02691425, -0.02719078]
        state_std: [0.10494395, 0.15176620, 0.37851673, 0.34427372, 0.90694684, 0.32539192, 0.01417590, 0.01405889]
    datasets:
      vla_data:
        dataloader_module: paligemma_datasets
        action_horizon: 10
        state_dim: 8
        include_state: true
        video_backend: torchcodec
    extra_args: []

  # --------------------------------------------------------------------------
  # PaliGemmaOFT BS128 eval (DiT action head, long_bs128 final_model)
  # --------------------------------------------------------------------------
  # PaliGemmaOFT mlp goal 30k eval (82% baseline)
  paligemma_oft_mlp_goal30k_eval:
    type: "eval"
    checkpoint: "./results/training/paligemma_oft_mlp_goal_30k/final_model"
    task_suite: "libero_goal"
    num_trials: 10
    host: "127.0.0.1"
    port: 5791
    gpu_id: 0
    use_bf16: true

  # --------------------------------------------------------------------------
  # PaliGemmaPi05 eval — final_model on all 4 LIBERO suites
  paligemma_pi05_eval:
    type: "eval"
    checkpoint: "./results/training/paligemma_pi05/final_model"
    task_suite: "libero_all"
    num_trials: 10
    host: "127.0.0.1"
    port: 5792
    gpu_id: 0
    use_bf16: true

  # --------------------------------------------------------------------------
  # BS128 v2 (lr scaled) eval — libero_10
  paligemma_oft_bs128v2_15k_eval:
    type: "eval"
    checkpoint: "./results/training/paligemma_oft_long_bs128_v2/checkpoints/steps_15000"
    task_suite: "libero_10"
    num_trials: 10
    host: "127.0.0.1"
    port: 5780
    gpu_id: 0
    use_bf16: true

  paligemma_oft_bs128v2_30k_eval:
    type: "eval"
    checkpoint: "./results/training/paligemma_oft_long_bs128_v2/final_model"
    task_suite: "libero_10"
    num_trials: 10
    host: "127.0.0.1"
    port: 5781
    gpu_id: 0
    use_bf16: true

  paligemma_oft_bs128_goal_eval:
    type: "eval"
    checkpoint: "./results/training/paligemma_oft_long_bs128/final_model"
    task_suite: "libero_goal"
    num_trials: 10
    host: "127.0.0.1"
    port: 5760
    gpu_id: 0
    use_bf16: true

  # PaliGemmaOFT mlp long 50k (working model, gripper debug)
  paligemma_oft_mlp_long50k_eval:
    type: "eval"
    checkpoint: "./results/training/paligemma_oft_mlp_long_50k/final_model"
    task_suite: "libero_10"
    num_trials: 10
    host: "127.0.0.1"
    port: 5775
    gpu_id: 0
    use_bf16: true

  # LlamaOFT 20k-v3 goal eval (for gripper comparison)
  llama_oft_v3_goal_debug:
    type: "eval"
    checkpoint: "./results/training/0319-LlamaOFT-LIBERO-20k-v3/final_model"
    task_suite: "libero_goal"
    num_trials: 10
    host: "127.0.0.1"
    port: 5770
    gpu_id: 0
    use_bf16: true

  paligemma_oft_bs128_spatial_eval:
    type: "eval"
    checkpoint: "./results/training/paligemma_oft_long_bs128/final_model"
    task_suite: "libero_spatial"
    num_trials: 10
    host: "127.0.0.1"
    port: 5761
    gpu_id: 0
    use_bf16: true

  paligemma_oft_bs128_object_eval:
    type: "eval"
    checkpoint: "./results/training/paligemma_oft_long_bs128/final_model"
    task_suite: "libero_object"
    num_trials: 10
    host: "127.0.0.1"
    port: 5762
    gpu_id: 2
    use_bf16: true

  paligemma_oft_bs128_long_eval:
    type: "eval"
    checkpoint: "./results/training/paligemma_oft_long_bs128/final_model"
    task_suite: "libero_10"
    num_trials: 10
    host: "127.0.0.1"
    port: 5763
    gpu_id: 0
    use_bf16: true

  # --------------------------------------------------------------------------
  # QwenOFT + LIBERO
  # --------------------------------------------------------------------------
  qwen_oft:
    model: qwen_oft
    num_gpus: 2
    run_id: "qwen_oft"
    framework_name: "QwenOFT"
    base_vlm: "Qwen3-VL-4B-Instruct"
    data_root: "${LIBERO_DATA_ROOT}"
    dataset_mix: "libero_goal"
    training:
      per_device_batch_size: 8
      gradient_accumulation_steps: 2
      max_train_steps: 30000
      save_interval: 5000
      eval_interval: 30001
      freeze_modules: ""
    framework:
      action_model:
        action_hidden_dim: 1024
        action_dim: 7
        state_dim: 7
        future_action_window_size: 7
        action_horizon: 8
        diffusion_model_cfg:
          output_dim: 1024
    datasets:
      vlm_data:
        dataloader_module: vlm_datasets
        dataformat: llava_json
        dataset_use: sharegpt4v_coco
        eval_dataset: sharegpt4v_coco
        data_flatten: false
        base_interval: 2
        max_pixels: 307200
        min_pixels: 784
        model_max_length: 2048
        model_type: qwen2.5vl
        per_device_batch_size: 4
      vla_data:
        dataloader_module: lerobot_datasets
        action_type: delta_qpos
        sequential_step_sampling: false
        CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
        CoT_answer: bbox
        default_image_resolution: [3, 224, 224]
        load_all_data_for_training: true
        obs: ["image_0"]
        video_backend: torchvision_av
    trainer:
      learning_rate:
        base: 3.0e-05
        qwen_vl_interface: 1.0e-05
        action_model: 1.0e-04
      logging_frequency: 100
    extra_args: []

  qwen_oft_5traj:
    model: qwen_oft
    num_gpus: 5
    run_id: "QwenOFT-5traj-libero_goal"
    framework_name: "QwenOFT"
    base_vlm: "Qwen2.5-VL-3B-Instruct"
    data_root: "${LIBERO_DATA_ROOT}"
    dataset_mix: "libero_goal"
    training:
      per_device_batch_size: 4
      gradient_accumulation_steps: 1
      max_train_steps: 20000
      save_interval: 5000
      eval_interval: 30001
      freeze_modules: ""
    framework:
      action_model:
        action_hidden_dim: 1024
        action_dim: 7
        state_dim: 7
        future_action_window_size: 7
        action_horizon: 8
        diffusion_model_cfg:
          output_dim: 1024
    datasets:
      vla_data:
        dataloader_module: lerobot_datasets
        action_type: delta_qpos
        sequential_step_sampling: false
        num_traj_per_task: 5
        CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
        CoT_answer: bbox
        default_image_resolution: [3, 224, 224]
        load_all_data_for_training: true
        obs: ["image_0"]
        video_backend: torchvision_av
    trainer:
      learning_rate:
        base: 3.0e-05
        qwen_vl_interface: 1.0e-05
        action_model: 1.0e-04
      logging_frequency: 50
    extra_args: []

  # --------------------------------------------------------------------------
  # π₀.₅ (PaliGemmaOFT framework) + LIBERO Goal — 5 traj per task
  # Finetune from openpi π₀.₅ base; mirror of qwen_oft_5traj for apples-to-
  # apples comparison.
  # --------------------------------------------------------------------------
  pi05_5traj:
    model: paligemma_oft
    num_gpus: 5
    run_id: "Pi05-5traj-libero_goal"
    framework_name: "PaliGemmaOFT"
    data_root: "${LIBERO_DATA_ROOT}"
    dataset: libero_paligemma
    dataset_mix: "libero_goal"

    training:
      per_device_batch_size: 2
      gradient_accumulation_steps: 2
      max_train_steps: 80000
      save_interval: 10000
      eval_interval: 80001
      freeze_modules: ""
      # openpi π₀.₅ base weights, pre-converted to AlphaBrain key layout via
      # weight_bridge.load_pi0_weights (action_dim=7 projections ready for LIBERO).
      # Training loader does load_state_dict(strict=False) — no extra glue.
      pretrained_checkpoint: ${PRETRAINED_MODELS_DIR}/pi05_base/model.safetensors

    framework:
      paligemma:
        base_vlm: ${PRETRAINED_MODELS_DIR}/paligemma-3b-pt-224
      action_model:
        action_dim: 7
        action_horizon: 10
        future_action_window_size: 9
        num_inference_steps: 10

    datasets:
      vla_data:
        dataloader_module: lerobot_datasets
        action_type: delta_qpos
        sequential_step_sampling: false
        num_traj_per_task: 5
        default_image_resolution: [3, 224, 224]
        obs: ["image_0"]
        load_all_data_for_training: true
        video_backend: torchvision_av

    trainer:
      learning_rate:
        # Uniform low LR for from-pretrained finetune — matches the recipe
        # that produced pi05_libero_alphabrain_ckpt (openpi-aligned).
        base: 2.5e-05
        action_model: 2.5e-05
        paligemma_vl_interface: 2.5e-05
      logging_frequency: 50

    extra_args: []

  # --------------------------------------------------------------------------
  # NeuroVLA + LIBERO
  # --------------------------------------------------------------------------
  neuro_vla:
    model: neurovla
    num_gpus: 4
    run_id: "neuro_vla"
    framework_name: "NeuroVLA"
