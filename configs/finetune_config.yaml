# ============================================================================
# AlphaBrain Finetune Configuration — Single Entry Point
# Usage: edit this file -> bash scripts/run_finetune.sh <mode>
#
# Priority (low -> high):
#   configs/models/<model>.yaml     model architecture defaults
#   configs/datasets/<dataset>.yaml dataset defaults
#   configs/trainer/default.yaml    trainer defaults
#     |
#   modes.<mode>.framework/datasets/trainer  overrides in this file (highest)
#
# Environment variables:
#   Data paths and python envs are defined in .env at project root.
#   wandb settings can be overridden per-mode or globally below.
# ============================================================================

defaults:
  trainer: default               # -> configs/trainer/default.yaml

# === Run Identity ===
run_id: "my_experiment"
run_root_dir: "./results/Checkpoints"
seed: 42

# === Environment ===
environment:
  wandb_mode: "online"
  wandb_project: "vla-engine-benchmark"
  wandb_entity: ""
  wandb_base_url: https://api.bandw.top
  num_gpus: 2
  main_process_port: 29500
  nccl:
    ib_hca: "mlx5_2,mlx5_3"
    blocking_wait: 1
    async_error_handling: 1
    timeout: 10000
    socket_timeout_ms: 360000

# === Paths ===
paths:
  deepspeed_config: "configs/deepspeed/accelerate_zero2.yaml"

common:
  output_root_dir: "./results/training"
  num_gpus: 2
  main_process_port: 29500


# ============================================================================
# Modes
# ============================================================================
modes:

  # --------------------------------------------------------------------------
  # PaliGemmaOFT (DiT action head, L1 regression) — single-task LIBERO
  # Target: 30k × 128 = 3.84M visible samples per task
  # --------------------------------------------------------------------------
  paligemma_oft_goal:
    model: paligemma_oft
    num_gpus: 2
    run_id: "paligemma_oft_goal"
    framework_name: "PaliGemmaOFT"
    data_root: "${LIBERO_DATA_ROOT}"
    dataset: libero
    dataset_mix: "libero_goal"
    deepspeed_config: "configs/deepspeed/accelerate_zero2.yaml"
    training:
      per_device_batch_size: 16
      gradient_accumulation_steps: 2
      max_train_steps: 60000
      save_interval: 10000
      eval_interval: 60001
      freeze_modules: ""
    framework:
      paligemma:
        base_vlm: ${PRETRAINED_MODELS_DIR}/paligemma-3b-pt-224
      action_model:
        action_dim: 7
        action_horizon: 10
        future_action_window_size: 9
        num_inference_steps: 10
    datasets:
      vla_data:
        dataloader_module: lerobot_datasets
    extra_args: []

  paligemma_oft_spatial:
    model: paligemma_oft
    num_gpus: 2
    run_id: "paligemma_oft_spatial"
    framework_name: "PaliGemmaOFT"
    data_root: "${LIBERO_DATA_ROOT}"
    dataset: libero
    dataset_mix: "libero_spatial"
    deepspeed_config: "configs/deepspeed/accelerate_zero2.yaml"
    training:
