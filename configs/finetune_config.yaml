    training:
      per_device_batch_size: 16
      gradient_accumulation_steps: 2
      max_train_steps: 60000
      save_interval: 10000
      eval_interval: 60001
      freeze_modules: ""
    framework:
      paligemma:
        base_vlm: ${PRETRAINED_MODELS_DIR}/paligemma-3b-pt-224
      action_model:
        action_dim: 7
        action_horizon: 10
        future_action_window_size: 9
        num_inference_steps: 10
    datasets:
      vla_data:
        dataloader_module: lerobot_datasets
    extra_args: []

  # --------------------------------------------------------------------------
  # PaliGemmaOFT — BS128 libero_10, lr linear scaled (8x from BS16 baseline)
  # Effective BS = 16 × 2 × 4 = 128, 30k steps, 3.84M samples
  # --------------------------------------------------------------------------
  paligemma_oft_long_bs128_v2:
    model: paligemma_oft
    num_gpus: 4
    main_process_port: 29520
    run_id: "paligemma_oft_long_bs128_v2"
    wandb_mode: "disabled"
    framework_name: "PaliGemmaOFT"
    data_root: "${LIBERO_DATA_ROOT}"
    dataset: libero
    dataset_mix: "libero_long"
    deepspeed_config: "configs/deepspeed/accelerate_zero2_4gpu_nooffload.yaml"
    training:
      per_device_batch_size: 16
      gradient_accumulation_steps: 2
      max_train_steps: 30000
      save_interval: 5000
      eval_interval: 30001
      freeze_modules: ""
    framework:
      paligemma:
        base_vlm: ${PRETRAINED_MODELS_DIR}/paligemma-3b-pt-224
        attn_implementation: flash_attention_2
      action_model:
        action_dim: 7
        action_horizon: 8
        future_action_window_size: 7
        num_inference_steps: 4
    datasets:
      vla_data:
        dataloader_module: lerobot_datasets
    trainer:
      learning_rate:
        base: 2.4e-04
        action_model: 8.0e-04
        paligemma_vl_interface: 8.0e-05
    extra_args: []

  # --------------------------------------------------------------------------
  # LlamaOFT — single-task LIBERO
  # Target: 30k × 128 = 3.84M visible samples per task
  # --------------------------------------------------------------------------
  llama_oft_goal:
    model: llama_oft
    num_gpus: 4
    run_id: "llama_oft_goal"
    framework_name: "LlamaOFT"
    data_root: "${LIBERO_DATA_ROOT}"
    dataset: libero
    dataset_mix: "libero_goal"
    deepspeed_config: "configs/deepspeed/accelerate_zero2_4gpu_nooffload.yaml"
    training:
      per_device_batch_size: 2
      gradient_accumulation_steps: 4
      max_train_steps: 120000
      save_interval: 20000
      eval_interval: 120001
      freeze_modules: "llama_vl_interface.model.language_model"
    framework:
      llamavl:
        base_vlm: ${PRETRAINED_MODELS_DIR}/Llama-3.2-11B-Vision-Instruct
      action_model:
        action_dim: 7
        future_action_window_size: 7
    datasets:
      vla_data:
        dataloader_module: lerobot_datasets
    trainer:
      learning_rate:
        base: 3.0e-05
        action_model: 1.0e-04
        llama_vl_interface: 1.0e-05
    extra_args: []

  llama_oft_spatial:
    model: llama_oft
    num_gpus: 4
    run_id: "llama_oft_spatial"
    framework_name: "LlamaOFT"
    data_root: "${LIBERO_DATA_ROOT}"
    dataset: libero
    dataset_mix: "libero_spatial"
    deepspeed_config: "configs/deepspeed/accelerate_zero2_4gpu_nooffload.yaml"
