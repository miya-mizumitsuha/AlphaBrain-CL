    num_gpus: 2
    run_id: "paligemma_oft_object"
    framework_name: "PaliGemmaOFT"
    data_root: "${LIBERO_DATA_ROOT}"
    dataset: libero
    dataset_mix: "libero_object"
    deepspeed_config: "configs/deepspeed/accelerate_zero2.yaml"
    training:
      per_device_batch_size: 16
      gradient_accumulation_steps: 2
      max_train_steps: 60000
      save_interval: 10000
